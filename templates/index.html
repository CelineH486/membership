<!DOCTYPE html>
<html>
<head>
    <title>Membership</title>
</head>
<body>

<h1>會員系統啟動成功 🎉</h1>

<input type="text" id="name" placeholder="姓名">
<input type="text" id="email" placeholder="Email">
<button onclick="register()">註冊</button>

<hr>

<button onclick="getMembers()">查看會員</button>

<h3>會員列表</h3>
<ul id="memberList"></ul>

<script>
function register() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    fetch("/api/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    });
}

function getMembers() {
    fetch("/api/members")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("memberList");
        list.innerHTML = "";

        data.forEach(member => {
            const li = document.createElement("li");
            li.textContent = member.name + " - " + member.email + " - " + member.level + " - " + member.points + "點";
            list.appendChild(li);
        });
    });
}
</script>

</body>
</html>
