<!DOCTYPE html>
<html>
<head>
    <title>註冊會員</title>
</head>
<body>

<h2>註冊會員</h2>

<input type="text" id="name" placeholder="姓名"><br><br>
<input type="date" id="birthday"><br><br>
<input type="text" id="phone" placeholder="手機"><br><br>
<input type="text" id="email" placeholder="Email"><br><br>

<button onclick="register()">送出註冊</button>

<script>
function register() {
    const name = document.getElementById("name").value;
    const birthday = document.getElementById("birthday").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;

    fetch("/api/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            birthday: birthday,
            phone: phone,
            email: email
        })
    })
    .then(res => {
    return res.json();
})
.then(data => {
    console.log(data);

    if (data.message) {
        alert(data.message);
    } else {
        alert("註冊失敗，後端沒有回傳 message");
    }

    if (data.message === "註冊成功") {
        window.location.href = "/";
    }
})
.catch(error => {
    console.log(error);
    alert("註冊發生錯誤，請看終端機或 Console");
});
}
</script>

</body>
</html>
